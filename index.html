<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        dnd: {
                            dark: '#1a1a2e',
                            panel: '#24243e',
                            red: '#e94560',
                            gold: '#f0a500'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f0f1a; color: #e2e8f0; }
        h1, h2, h3, .font-title { font-family: 'Cinzel', serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a2e; }
        ::-webkit-scrollbar-thumb { background: #e94560; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d03b55; }

        .strike-through {
            text-decoration: line-through;
            color: #64748b;
            transition: all 0.3s ease;
        }

        /* Dice Animation */
        @keyframes dynamicRoll {
            0% { transform: rotate(0deg) scale(1) translateY(0); }
            25% { transform: rotate(25deg) scale(1.2) translateY(-10px); }
            50% { transform: rotate(-25deg) scale(0.9) translateY(5px); }
            75% { transform: rotate(15deg) scale(1.1) translateY(-5px); }
            100% { transform: rotate(0deg) scale(1) translateY(0); }
        }
        .rolling { animation: dynamicRoll 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; color: #f0a500 !important; }

        /* Slide & Fade Animations */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        .number-blur { filter: blur(2px); opacity: 0.8; }
    </style>
</head>

        // --- CORE NAVIGATION ---

        function initApp() {

        function showView(viewId) {
            // Hide all views
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');

            // Header adjustments
            const btnBack = document.getElementById('btn-back-selection');
            const btnDm = document.getElementById('btn-dm-mode');
            
            if (viewId === 'selection-view') {
                btnBack.classList.add('hidden');
                btnDm.classList.remove('hidden');
                closeDiceTray();
            } else if (viewId === 'sheet-view' || viewId === 'dm-dashboard-view' || viewId === 'dm-setup-view') {
                btnBack.classList.remove('hidden');
                btnDm.classList.add('hidden');
            }

            if(viewId === 'dm-dashboard-view') {
                renderDmDashboard();
            }
        }

                    <p class="text-xs text-dnd-gold uppercase tracking-wider mb-3">${char.race} • ${char.class}</p>
                    <p class="text-sm text-gray-400 italic">"${char.tagline}"</p>
                </div>
            `).join('');
        }

        function openModal(index) {
            const char = characters[index];
            const modal = document.getElementById('character-modal');
            const contentBox = document.getElementById('modal-content-box');
            
            contentBox.innerHTML = `
                <div class="relative bg-dnd-dark p-6 text-center border-b border-gray-700 overflow-hidden">
                    <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition-colors z-10">
                        <i class="fa-solid fa-times text-xl"></i>
                    </button>
                    <div class="absolute inset-0 opacity-10 flex items-center justify-center">
                         <i class="fa-solid ${char.icon} text-[150px] ${char.color}"></i>
                    </div>
                    <div class="relative z-10">
                        <div class="w-24 h-24 mx-auto bg-slate-800 rounded-full flex items-center justify-center mb-4 border-2 border-gray-600 shadow-xl">
                            <i class="fa-solid ${char.icon} text-4xl ${char.color}"></i>
                        </div>
                        <h2 class="text-3xl text-dnd-gold font-title mb-1">${char.name}</h2>
                        <p class="text-gray-300 uppercase tracking-widest text-sm">${char.race} | ${char.class}</p>
                    </div>
                </div>
                <div class="p-6 bg-dnd-panel">
                    <div class="mb-6">
                        <h4 class="text-sm text-gray-400 uppercase mb-2 flex items-center gap-2">
                            <i class="fa-solid fa-bullseye text-dnd-red"></i> Recomendado para:
                        </h4>
                        <p class="text-white text-sm leading-relaxed">${char.recommended}</p>
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-lg border border-gray-600 text-gray-300 hover:bg-slate-700 transition-colors">
                            Cancelar
                        </button>
                        <button onclick="lockCharacter(${index})" class="flex-1 px-4 py-3 rounded-lg bg-dnd-red hover:bg-red-600 text-white font-bold transition-colors shadow-lg shadow-red-900/50 flex items-center justify-center gap-2">
                            <i class="fa-solid fa-user-check"></i> Jugar
                        </button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            contentBox.classList.remove('scale-95');
            contentBox.classList.add('scale-100');
        }

        function closeModal() {
            const modal = document.getElementById('character-modal');
            const contentBox = document.getElementById('modal-content-box');
            modal.classList.add('opacity-0');
            contentBox.classList.remove('scale-100');
            contentBox.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function lockCharacter(index) {
            closeModal();
            activePlayerIndex = index;
            renderPlayerSheet();
            showView('sheet-view');
        }

        function renderPlayerSheet() {
            const char = characters[activePlayerIndex];
            const content = document.getElementById('sheet-view');
            
            content.innerHTML = `
                <!-- Player Header -->
                <div class="bg-dnd-panel rounded-xl shadow-lg p-6 border border-gray-700 mb-6 flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 opacity-5 text-9xl pointer-events-none ${char.color}">
                        <i class="fa-solid ${char.icon}"></i>
                    </div>
                    
                    <div class="flex items-center gap-6 z-10">
                        <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center border border-gray-600 hidden sm:flex shadow-inner">
                            <i class="fa-solid ${char.icon} text-2xl ${char.color}"></i>
                        </div>
                        <div>
                            <h2 class="text-3xl md:text-4xl text-dnd-gold mb-1">${char.name}</h2>
                            <p class="text-gray-400 text-lg uppercase tracking-widest">${char.race} • ${char.class}</p>
                        </div>
                    </div>

                    <div class="flex gap-6 z-10">
                        <div class="flex flex-col items-center justify-center relative">
                            <i class="fa-solid fa-shield text-5xl text-slate-700"></i>
                            <span class="absolute text-2xl font-bold font-title text-white mt-1">${char.ac}</span>
                            <span class="text-xs text-gray-400 mt-2 text-center w-20 leading-tight">${char.acDesc}</span>
                        </div>

                        <div class="bg-slate-800 border border-slate-600 rounded-lg p-3 flex flex-col items-center min-w-[120px]">
                            <span class="text-xs text-dnd-red uppercase font-bold mb-1">Puntos de Golpe</span>
                            <div class="flex items-center gap-3">
                                <button onclick="changePlayerHp(-1)" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-dnd-red flex items-center justify-center transition-colors"><i class="fa-solid fa-minus"></i></button>
                                <span class="text-2xl font-bold font-title w-10 text-center" id="player-hp-display">${char.currentHp}</span>
                                <button onclick="changePlayerHp(1)" class="w-8 h-8 rounded-full bg-slate-700 hover:bg-emerald-500 flex items-center justify-center transition-colors"><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <span class="text-xs text-gray-500 mt-1">Máx: ${char.hpMax}</span>
                        </div>
                    </div>
                </div>

                <!-- Custom Dice Bar -->
                <div class="bg-slate-800 rounded-xl p-3 border border-gray-700 mb-6 flex overflow-x-auto gap-2 items-center hide-scrollbar shadow-inner">
                    <span class="text-dnd-gold text-sm whitespace-nowrap pl-2 pr-4 font-bold border-r border-gray-600 mr-2"><i class="fa-solid fa-dice"></i> Dados Libres</span>
                    <button onclick="quickRoll(4)" class="px-4 py-2 bg-slate-700 hover:bg-dnd-red rounded border border-gray-600 hover:border-red-400 transition-colors">d4</button>
                    <button onclick="quickRoll(6)" class="px-4 py-2 bg-slate-700 hover:bg-dnd-red rounded border border-gray-600 hover:border-red-400 transition-colors">d6</button>
                    <button onclick="quickRoll(8)" class="px-4 py-2 bg-slate-700 hover:bg-dnd-red rounded border border-gray-600 hover:border-red-400 transition-colors">d8</button>
                    <button onclick="quickRoll(10)" class="px-4 py-2 bg-slate-700 hover:bg-dnd-red rounded border border-gray-600 hover:border-red-400 transition-colors">d10</button>
                    <button onclick="quickRoll(12)" class="px-4 py-2 bg-slate-700 hover:bg-dnd-red rounded border border-gray-600 hover:border-red-400 transition-colors">d12</button>
                    <button onclick="quickRoll(20)" class="px-4 py-2 bg-dnd-red hover:bg-red-500 rounded border border-red-400 transition-colors font-bold">d20</button>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                    <!-- Attacks -->
                    <div class="bg-dnd-panel rounded-xl p-5 border border-gray-700">
                        <h3 class="text-xl text-dnd-red border-b border-gray-700 pb-2 mb-4 flex items-center gap-2"><i class="fa-solid fa-gavel"></i> Ataques</h3>
                        <div class="space-y-3">
                            ${char.attacks.map((atk) => `
                                <div onclick="${atk.special ? `rollDamage('${atk.name}', '${atk.dmgDice}', ${atk.dmgMod}, '${atk.type}', '${atk.desc}')` : `rollAttack('${atk.name}', ${atk.mod}, '${atk.dmgDice}', ${atk.dmgMod}, '${atk.type}')`}" 
                                     class="bg-slate-800 p-3 rounded cursor-pointer hover:bg-slate-700 border border-transparent hover:border-dnd-gold/50 transition-all group">
                                    <div class="flex justify-between items-center mb-1">
                                        <span class="font-bold text-lg group-hover:text-dnd-gold">${atk.name}</span>
                                        ${!atk.special ? `<span class="bg-slate-900 px-2 py-1 rounded text-sm text-emerald-400 font-mono">+${atk.mod}</span>` : `<span class="text-xs text-dnd-gold"><i class="fa-solid fa-star"></i> Especial</span>`}
                                    </div>
                                    <div class="text-sm text-gray-400"><i class="fa-solid fa-dice-d20 mr-1"></i> ${atk.dmgDice}${atk.dmgMod > 0 ? '+'+atk.dmgMod : ''} ${atk.type}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Skills -->
                    <div class="bg-dnd-panel rounded-xl p-5 border border-gray-700">
                        <h3 class="text-xl text-dnd-red border-b border-gray-700 pb-2 mb-4 flex items-center gap-2"><i class="fa-solid fa-star"></i> Habilidades</h3>
                        <div class="grid grid-cols-2 gap-3">
                            ${char.skills.map(skill => `
                                <div onclick="rollSkill('${skill.name}', ${skill.mod})" class="flex justify-between items-center bg-slate-800 p-3 rounded cursor-pointer hover:bg-slate-700 border border-transparent hover:border-emerald-500/50 transition-all group">
                                    <span class="group-hover:text-white">${skill.name}</span>
                                    <span class="font-mono text-emerald-400 bg-slate-900 px-2 py-1 rounded shadow-inner">+${skill.mod}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Abilities & Equipment -->
                    <div class="flex flex-col gap-6">
                        <div class="bg-dnd-panel rounded-xl p-5 border border-gray-700">
                            <h3 class="text-xl text-dnd-red border-b border-gray-700 pb-2 mb-4 flex items-center gap-2"><i class="fa-solid fa-bolt"></i> Rasgos</h3>
                            <div class="mb-3"><strong class="text-dnd-gold block mb-1">${char.ability.name}</strong><p class="text-sm text-gray-300 leading-relaxed">${char.ability.desc}</p></div>
                            ${char.ability2 ? `<div><strong class="text-dnd-gold block mb-1">${char.ability2.name}</strong><p class="text-sm text-gray-300 leading-relaxed">${char.ability2.desc}</p></div>` : ''}
                        </div>

                        <div class="bg-dnd-panel rounded-xl p-5 border border-gray-700 flex-grow">
                            <h3 class="text-xl text-dnd-red border-b border-gray-700 pb-2 mb-4 flex items-center gap-2"><i class="fa-solid fa-backpack"></i> Equipamiento</h3>
                            <ul class="space-y-2">
                                ${char.equipment.map((item, i) => `
                                    <li class="flex items-center gap-3 equipment-item ${char.equipState[i] ? 'strike-through' : ''}" onclick="togglePlayerEquip(${i}, this)">
                                        <div class="w-5 h-5 rounded border ${char.equipState[i] ? 'bg-dnd-red border-dnd-red' : 'border-gray-500'} flex items-center justify-center transition-colors">
                                            ${char.equipState[i] ? '<i class="fa-solid fa-check text-white text-xs"></i>' : ''}
                                        </div>
                                        <span>${item}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
            `;
        }

        function changePlayerHp(amount) {
            const char = characters[activePlayerIndex];
            char.currentHp = Math.max(0, Math.min(char.hpMax, char.currentHp + amount));
            document.getElementById('player-hp-display').innerText = char.currentHp;
        }

        function togglePlayerEquip(index, el) {
            const char = characters[activePlayerIndex];
            char.equipState[index] = !char.equipState[index];
            const cb = el.querySelector('div');
            if (char.equipState[index]) {
                el.classList.add('strike-through');
                cb.classList.add('bg-dnd-red', 'border-dnd-red'); cb.classList.remove('border-gray-500');
                cb.innerHTML = '<i class="fa-solid fa-check text-white text-xs"></i>';
            } else {
                el.classList.remove('strike-through');
                cb.classList.remove('bg-dnd-red', 'border-dnd-red'); cb.classList.add('border-gray-500');
                cb.innerHTML = '';
            }
        }

        // --- DM MODE LOGIC ---

        function renderDMSetup() {
            const grid = document.getElementById('dm-roster-grid');
            grid.innerHTML = baseCharacters.map((char, index) => {
                // Count how many of this char are in party
                const count = dmParty.filter(p => p.baseIndex === index).length;
                return `
                <div class="flex items-center justify-between bg-slate-800 p-3 rounded-lg border border-gray-600">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center border border-gray-700">
                            <i class="fa-solid ${char.icon} ${char.color}"></i>
                        </div>
                        <div>
                            <p class="font-bold text-sm text-white leading-tight">${char.name.split(' ')[0]}</p>
                            <p class="text-xs text-gray-400">${char.class}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-2 bg-slate-900 rounded-full p-1 border border-gray-700">
                        <button onclick="updatePartyCount(${index}, -1)" class="w-6 h-6 rounded-full bg-slate-700 hover:bg-red-500 text-white flex items-center justify-center text-xs transition-colors"><i class="fa-solid fa-minus"></i></button>
                        <span class="w-4 text-center text-sm font-bold">${count}</span>
                        <button onclick="updatePartyCount(${index}, 1)" class="w-6 h-6 rounded-full bg-slate-700 hover:bg-emerald-500 text-white flex items-center justify-center text-xs transition-colors"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
            `}).join('');
            document.getElementById('dm-party-count').innerText = dmParty.length;
        }

        function updatePartyCount(baseIndex, change) {
            if (change > 0) {
                // Add to party
                const charData = baseCharacters[baseIndex];
                dmParty.push({
                    baseIndex: baseIndex,
                    id: Date.now() + Math.random(), // unique ID
                    name: charData.name.split(' ')[0],
                    icon: charData.icon, color: charData.color,
                    hpMax: charData.hpMax,
                    currentHp: charData.hpMax,
                    ac: charData.ac,
                    initiative: 0,
                    equipment: [...charData.equipment],
                    equipState: new Array(charData.equipment.length).fill(false)
                });
            } else if (change < 0) {
                // Remove last instance of this char
                for (let i = dmParty.length - 1; i >= 0; i--) {
                    if (dmParty[i].baseIndex === baseIndex) {
                        dmParty.splice(i, 1);
                        break;
                    }
                }
            }
            renderDMSetup();
        }

        function startDMSession() {
            if(dmParty.length === 0) { alert("¡Añade al menos un jugador al grupo!"); return; }
            showView('dm-dashboard-view');
        }

        function renderDmDashboard() {
            const container = document.getElementById('dm-party-container');
            if(dmParty.length === 0) { container.innerHTML = '<p class="text-gray-400 italic">No hay jugadores en el grupo.</p>'; return; }

            container.innerHTML = dmParty.map((p, i) => `
                <div class="bg-dnd-panel rounded-xl p-5 border border-indigo-500/30 shadow-lg relative">
                    <div class="flex justify-between items-start mb-4 border-b border-gray-700 pb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-full bg-slate-800 flex items-center justify-center border border-gray-600">
                                <i class="fa-solid ${p.icon} text-xl ${p.color}"></i>
                            </div>
                            <div>
                                <h3 class="font-title text-xl text-white leading-tight">${p.name}</h3>
                                <p class="text-xs text-gray-400">CA: <span class="text-white font-bold">${p.ac}</span></p>
                            </div>
                        </div>
                        <div class="flex flex-col items-end">
                            <label class="text-xs text-gray-400 uppercase mb-1">Iniciativa</label>
                            <input type="number" value="${p.initiative}" onchange="updateInitiative(${i}, this.value)" class="w-16 bg-slate-900 border border-indigo-500/50 rounded p-1 text-center text-dnd-gold font-bold font-title">
                        </div>
                    </div>

                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm text-gray-400 font-bold">PUNTOS DE GOLPE</span>
                        <div class="flex items-center gap-3 bg-slate-900 p-1 rounded-lg border border-gray-700">
                            <button onclick="updateDmHp(${i}, -1)" class="w-8 h-8 rounded bg-slate-800 hover:bg-dnd-red transition-colors"><i class="fa-solid fa-minus"></i></button>
                            <span class="text-2xl font-title w-10 text-center ${p.currentHp <= p.hpMax/3 ? 'text-dnd-red' : 'text-white'}">${p.currentHp}</span>
                            <button onclick="updateDmHp(${i}, 1)" class="w-8 h-8 rounded bg-slate-800 hover:bg-emerald-500 transition-colors"><i class="fa-solid fa-plus"></i></button>
                        </div>
                    </div>

                    <details class="group">
                        <summary class="text-xs text-gray-400 cursor-pointer hover:text-white uppercase font-bold outline-none flex justify-between items-center bg-slate-800 p-2 rounded">
                            <span><i class="fa-solid fa-backpack mr-2"></i> Equipamiento</span>
                            <i class="fa-solid fa-chevron-down group-open:rotate-180 transition-transform"></i>
                        </summary>
                        <ul class="mt-2 space-y-1 bg-slate-900 p-2 rounded border border-gray-700 max-h-32 overflow-y-auto hide-scrollbar">
                            ${p.equipment.map((item, eqIdx) => `
                                <li class="flex items-center gap-2 text-sm equipment-item ${p.equipState[eqIdx] ? 'strike-through' : ''}" onclick="toggleDmEquip(${i}, ${eqIdx})">
                                    <i class="fa-solid ${p.equipState[eqIdx] ? 'fa-check-square text-dnd-red' : 'fa-square text-gray-500'}"></i> ${item}
                                </li>
                            `).join('')}
                        </ul>
                    </details>
                </div>
            `).join('');
        }

        function updateDmHp(partyIndex, change) {
            let p = dmParty[partyIndex];
            p.currentHp = Math.max(0, Math.min(p.hpMax, p.currentHp + change));
            renderDmDashboard();
        }

        function updateInitiative(partyIndex, val) {
            dmParty[partyIndex].initiative = parseInt(val) || 0;
        }

        function sortInitiative() {
            dmParty.sort((a, b) => b.initiative - a.initiative);
            renderDmDashboard();
        }

        function toggleDmEquip(partyIdx, eqIdx) {
            dmParty[partyIdx].equipState[eqIdx] = !dmParty[partyIdx].equipState[eqIdx];
            renderDmDashboard();
        }

        // --- ENHANCED DICE LOGIC (Slot Machine Effect) ---

        function getRand(sides) { 
            // Utilizamos la API de Criptografía Web para obtener una aleatoriedad segura y pura
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return (array[0] % sides) + 1;
        }

        function triggerDiceAnimation(title, formula, finalMainResult, subResultText = "") {
            const tray = document.getElementById('dice-overlay');
            const icon = document.getElementById('dice-icon');
            const mainResultEl = document.getElementById('dice-result-main');
            const subResultEl = document.getElementById('dice-result-sub');

            // Set texts
            document.getElementById('dice-title').innerText = title;
            document.getElementById('dice-formula').innerText = formula;
            subResultEl.classList.add('hidden');
            subResultEl.classList.remove('fade-in');
            
            // Show Tray
            tray.classList.remove('hidden', 'slide-up');
            void tray.offsetWidth; 
            tray.classList.add('slide-up');

            // Icon Animation
            icon.classList.remove('rolling');
            void icon.offsetWidth;
            icon.classList.add('rolling');

            // Slot Machine Text Effect
            const duration = 600; // ms
            const intervalTime = 40; 
            const startTime = Date.now();
            
            mainResultEl.classList.add('text-dnd-gold', 'number-blur');
            mainResultEl.classList.remove('text-white');

            const slotInterval = setInterval(() => {
                const now = Date.now();
                if (now - startTime >= duration) {
                    clearInterval(slotInterval);
                    // Final state
                    mainResultEl.innerText = finalMainResult;
                    mainResultEl.classList.remove('text-dnd-gold', 'number-blur');
                    mainResultEl.classList.add('text-white');
                    
                    if(subResultText) {
                        subResultEl.innerText = subResultText;
                        subResultEl.classList.remove('hidden');
                        subResultEl.classList.add('fade-in');
                    }
                } else {
                    // Random scrolling number (1-20 visual only)
                    mainResultEl.innerText = getRand(20);
                }
            }, intervalTime);
        }

        function closeDiceTray() {
            document.getElementById('dice-overlay').classList.add('hidden');
        }

        // Specific Rolls
        function rollAttack(name, hitMod, dmgDiceStr, dmgMod, type) {
            const d20 = getRand(20);
            const totalHit = d20 + hitMod;
            
            const [count, sides] = dmgDiceStr.split('d').map(Number);
            let dmgTotal = 0;
            for(let i=0; i<count; i++) dmgTotal += getRand(sides);
            dmgTotal += dmgMod;

            let hitText = `${totalHit}`;
            if (d20 === 20) hitText = "¡CRÍTICO!";
            if (d20 === 1) hitText = "Pifia...";

            triggerDiceAnimation(`Ataque: ${name}`, `ATQ: 1d20+${hitMod} | DAÑO: ${dmgDiceStr}${dmgMod>0 ? '+'+dmgMod : ''}`, hitText, `(${dmgTotal} de daño ${type})`);
        }

        function rollDamage(name, dmgDiceStr, dmgMod, type, desc) {
            const [count, sides] = dmgDiceStr.split('d').map(Number);
            let dmgTotal = 0;
            for(let i=0; i<count; i++) dmgTotal += getRand(sides);
            dmgTotal += dmgMod;

            triggerDiceAnimation(`Especial: ${name}`, `DAÑO: ${dmgDiceStr}${dmgMod>0 ? '+'+dmgMod : ''}`, `${dmgTotal}`, `daño ${type}`);
        }

        function rollSkill(name, mod) {
            const d20 = getRand(20);
            const total = d20 + mod;
            triggerDiceAnimation(`Chequeo: ${name}`, `1d20 ${mod >= 0 ? '+' : ''}${mod} (Dado sacó ${d20})`, total, "");
        }

        function quickRoll(sides) {
            const result = getRand(sides);
            triggerDiceAnimation(`Tirada Libre (d${sides})`, `Rolando 1d${sides}...`, result, "");
        }

        // Start
        window.onload = initApp;

    </script>
</body>
